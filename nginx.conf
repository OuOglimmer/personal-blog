# ============================================
# 强制 HTTP → HTTPS 跳转
# ============================================
server {
    listen 80;
    server_name www.hyckr.xyz hyckr.xyz 117.72.96.105;
    return 301 https://$host$request_uri;
}

# ============================================
# HTTPS 主站
# ============================================
server {
    listen 443 ssl http2;
    server_name www.hyckr.xyz hyckr.xyz;

    # 根目录：指向 dist/client/（index.html 所在目录）
    root /www/wwwroot/117.72.96.105/vue-app/dist/client;
    index index.html;

    # ========== SSL ==========
    ssl_certificate      /www/server/panel/vhost/cert/117.72.96.105/fullchain.pem;
    ssl_certificate_key  /www/server/panel/vhost/cert/117.72.96.105/privkey.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ========== SPA history 回退 ==========
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========== 静态资源强缓存 ==========
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ========== 放行 Let's Encrypt 验证 ==========
    location ~ /\.well-known {
        allow all;
    }

    # ========== 禁止敏感文件和目录 ==========
    location ~* \.(env|log|sql|git|svn|htaccess|DS_Store|md|lock|bak|tmp|swp)$ {
        return 404;
    }

    location ~* /(node_modules|\.git|\.svn|runtime) {
        return 404;
    }

    access_log  /www/wwwlogs/hyckr.xyz.log;
    error_log   /www/wwwlogs/hyckr.xyz.error.log;
}
